# railway.toml - Configuracion de Railway para NegocIA v2
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput --clear"

[deploy]
preDeployCommand = "python manage.py migrate_schemas --shared && python manage.py migrate_schemas && python manage.py create_initial_plans && (python manage.py fix_tenant_usernames --fix || echo 'fix_tenant_usernames done')"
startCommand = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 --log-level info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5